server.port=8080
spring.application.name=ddd-demo

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:ddndemo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MyBatis-Plus Configuration
mybatis-plus.mapper-locations=classpath:/mapper/**/*.xml
mybatis-plus.type-aliases-package=com.example.ddd.infrastructure.mybatis.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# H2 Console (for demo purposes)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
